<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - TRASHURE</title>
    <link rel="stylesheet" href="sg.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="background-container">
        
        <div class="signup-card">
            <h2>Daftar dulu disini!</h2>
            
            <form id="signupForm" action="proses_daftar.php" method="POST">
                
                <div class="input-group">
                    <label for="fullname">Nama Lengkap</label>
                    <input type="text" id="fullname" name="nama" required>
                </div>

                <div class="input-group">
                    <label for="gmail">Gmail</label>
                    <input type="text" id="gmail" name="gmail" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required>
                        <i class="fas fa-eye-slash" id="togglePassword"></i>
                    </div>
                </div>

                <button type="submit" name="daftar" class="btn-daftar">Daftar Sekarang</button>

                <div class="form-links">
                    <a href="index.html" class="login-link">udah punya akun? Masuk!</a>
                </div>
            </form>
        </div>

        <div class="logo-container">
            <img src="logo.png" alt="TRASHURE Logo" class="main-logo">
        </div>

    </div>

    <script src="sg.js"></script>
</body>
</html>
